# SonarQube project configuration for RainPoint Spenceh14 Integration

# Project identification
sonar.projectKey=spenceh14_ha-rainpoint
sonar.organization=funkadelic

# Project metadata
sonar.projectName=RainPoint Spenceh14 Integration
sonar.projectVersion=1.5.3 # x-release-please-version

# Source code location
sonar.sources=custom_components/rainpoint_spenceh14
sonar.tests=tests
sonar.test.inclusions=tests/**/*

# Exclude test files from duplication detection
sonar.cpd.exclusions=tests/**/*

# Python version for analysis
# pytest-homeassistant-custom-component 0.13.310+ requires Python 3.13+
sonar.python.version=3.13

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Suppress false positives from Home Assistant platform contracts
# HA requires async_setup, async_setup_entry, async_unload_entry, etc. to be
# async even when they do not await, and dictates their parameter signatures.
sonar.issue.ignore.multicriteria=e1,e2

# S7503: async functions that do not use async features.
# HA contract: async_setup_* must be async whether or not they await.
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.e1.resourceKey=custom_components/rainpoint_spenceh14/**/*.py

# S1172: unused function parameters.
# HA contract: async_setup(hass, config), async_setup_entry(hass, entry),
# async_unload_entry(hass, entry) signatures are dictated by the platform.
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e2.resourceKey=custom_components/rainpoint_spenceh14/__init__.py
