[tool.coverage.run]
omit = ["custom_components/rainpoint/debug.py"]

[tool.coverage.report]
fail_under = 99

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
addopts = [
    "--cov=custom_components.rainpoint",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-report=html",
    "-v",
]

[tool.ruff]
target-version = "py313"
line-length = 130

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "RUF",
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.rainpoint"]
