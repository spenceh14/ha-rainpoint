reload:
  name: Reload Integration
  description: Reload the RainPoint integration without restarting Home Assistant. If no entry_id is provided, all RainPoint integrations will be reloaded.
  fields:
    entry_id:
      name: Entry ID
      description: The configuration entry ID to reload (optional - leave blank to reload all)
      required: false
      example: "01KMW3R7FW6WWV4QMK19WN55EZ"
      selector:
        text:
